<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>설문지</title>

    <body>
        <h3>설문지</h3>
        <br>
        소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.
        <hr>
        
        <form>
        학년<input type="radio" name="grade"value="1">

        <input type="radio" name="grade"value="2">

        <input type="radio" name="grade"value="3">
        3학년<br>

        <input type="radio" name="gender"value="2">여<br>

        관심분야<select>
            <option value="1">컴퓨터공학</option>
            <option value="2">스포츠</option>
            <option value="3">시각예술</option>
        </select><br>
        
        진로
        <input type="checkbox"value="1">개발
        <input type="checkbox"value="2">기획
        <input type="checkbox"value="3">영업
        <input type="checkbox"value="4">창업
        <br>
        
        <br>남기고 싶은 말<br>
        <textarea cols="50" rows="6">글을 남겨주세요.</textarea>

        </form>
